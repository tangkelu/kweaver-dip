replicaCount: 1

image:
  repository: mariadb
  pullPolicy: IfNotPresent
  tag: "11.4.7"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 3306
  targetPort: 3306

resources:
  limits:
    cpu: 375m
    memory: 384Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

# MariaDB specific configuration
mariadb:
  namespace: resource
  releaseName: mariadb
  
  # Database credentials
  auth:
    rootPassword: "mariadb-root-password"
    database: "adp"
    username: "adp"
    password: "adp@123456"
  
  # Database configuration
  config:
    maxConnections: 5000
  
  # Storage configuration
  persistence:
    enabled: true
    storageClassName: ""
    size: 10Gi
    accessMode: ReadWriteOnce
    mountPath: /var/lib/mysql
  
  # Probes configuration
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3
  
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
