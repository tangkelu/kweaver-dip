apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "proton-mariadb.fullname" . }}
  namespace: {{ .Values.mariadb.namespace }}
  labels:
    {{- include "proton-mariadb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "proton-mariadb.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "proton-mariadb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "proton-mariadb.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "proton-mariadb.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mariadb
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          args:
            - --max-connections={{ .Values.mariadb.config.maxConnections }}
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "proton-mariadb.fullname" . }}-auth
                  key: mariadb-root-password
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "proton-mariadb.fullname" . }}-auth
                  key: mariadb-database
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "proton-mariadb.fullname" . }}-auth
                  key: mariadb-user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "proton-mariadb.fullname" . }}-auth
                  key: mariadb-password
          volumeMounts:
            - name: data
              mountPath: {{ .Values.mariadb.persistence.mountPath }}
          {{- if .Values.mariadb.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: {{ .Values.mariadb.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mariadb.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.mariadb.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.mariadb.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.mariadb.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: {{ .Values.mariadb.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mariadb.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.mariadb.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.mariadb.livenessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.mariadb.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.mariadb.persistence.accessMode }}
        {{- if .Values.mariadb.persistence.storageClassName }}
        storageClassName: {{ .Values.mariadb.persistence.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mariadb.persistence.size }}
  {{- else }}
  template:
    spec:
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
