components:
  schemas:
    DigitalHumanSkill:
      summary: 技能启用状态
      type: object
      properties:
        name:
          type: string
          title: 技能名称
        description:
          type: string
          title: 技能描述
        built_in:
          type: boolean
          title: 是否为 DIP 数字员工内置技能
          description: |
            为 `true` 表示属于内置 trio：`archive-protocol`、`schedule-plan`、`kweaver-core`。
      required:
        - name
        - built_in

    DigitalHumanAgentSkill:
      summary: 数字员工技能状态
      type: object
      properties:
        name:
          type: string
          title: 技能名称
        description:
          type: string
          title: 技能描述
        built_in:
          type: boolean
          title: 是否为 DIP 数字员工内置技能
          description: |
            为 `true` 表示属于内置 trio：`archive-protocol`、`schedule-plan`、`kweaver-core`。
      required:
        - name
        - built_in

    DigitalHumanSkillList:
      summary: 技能列表
      type: array
      items:
        $ref: '#/components/schemas/DigitalHumanSkill'

    DigitalHumanAgentSkillList:
      summary: 数字员工技能列表
      description: |
        全局可用技能中该 agent 已启用的条目；`built_in` 标识是否为 DIP 内置技能。
      type: array
      items:
        $ref: '#/components/schemas/DigitalHumanAgentSkill'

    InstallSkillResult:
      summary: 安装 .skill 包后的响应
      type: object
      properties:
        skillName:
          type: string
          title: 技能 ID（与 zip 内顶层目录名一致）
        skillPath:
          type: string
          title: 网关上落盘的绝对路径
      required:
        - skillName
        - skillPath
      additionalProperties: false
