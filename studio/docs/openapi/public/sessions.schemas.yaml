components:
  schemas:
    SessionsListResponse:
      summary: 会话列表响应
      type: object
      properties:
        ts:
          type: integer
          description: 服务端时间戳（毫秒）
        path:
          type: string
          description: 会话来源路径
        count:
          type: integer
          minimum: 0
          description: 会话总数
        defaults:
          $ref: '#/components/schemas/SessionDefaults'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
      required:
        - ts
        - path
        - count
        - sessions
      additionalProperties: true

    SessionDefaults:
      summary: 会话默认模型配置
      type: object
      properties:
        modelProvider:
          type: string
        model:
          type: string
        contextTokens:
          type: integer
          minimum: 0
      additionalProperties: true

    SessionSummary:
      summary: 会话摘要
      type: object
      properties:
        key:
          type: string
          description: 会话唯一 key
        kind:
          type: string
          description: 会话类型
        label:
          type: string
          description: 会话标签
        displayName:
          type: string
          description: 展示名称
        updatedAt:
          type: integer
          description: 最近更新时间（毫秒）
        sessionId:
          type: string
          description: 会话实例 ID
        chatType:
          type: string
        origin:
          $ref: '#/components/schemas/SessionOrigin'
        deliveryContext:
          $ref: '#/components/schemas/SessionDeliveryContext'
        lastChannel:
          type: string
        systemSent:
          type: boolean
        abortedLastRun:
          type: boolean
        totalTokensFresh:
          type: boolean
        modelProvider:
          type: string
        model:
          type: string
        contextTokens:
          type: integer
          minimum: 0
      required:
        - key
        - kind
        - updatedAt
        - sessionId
      additionalProperties: true

    SessionOrigin:
      summary: 会话来源信息
      type: object
      properties:
        provider:
          type: string
        surface:
          type: string
        chatType:
          type: string
      additionalProperties: true

    SessionDeliveryContext:
      summary: 会话投递上下文
      type: object
      properties:
        channel:
          type: string
      additionalProperties: true

    SessionGetResponse:
      summary: 单个会话消息响应
      type: object
      properties:
        key:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionMessage'
      required:
        - key
      additionalProperties: true

    SessionMessage:
      summary: 会话消息
      type: object
      properties:
        id:
          type: string
        role:
          type: string
        content:
          description: 消息内容，结构随上游返回
        ts:
          type: integer
      additionalProperties: true

    SessionsPreviewRequest:
      summary: 会话预览请求
      type: object
      properties:
        keys:
          type: array
          minItems: 1
          items:
            type: string
          description: 要预览的会话 key 列表
        limit:
          type: integer
          minimum: 0
          description: 每个会话返回的消息上限
      required:
        - keys
      additionalProperties: false

    SessionsPreviewResponse:
      summary: 会话预览响应
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionPreviewItem'
      additionalProperties: true

    SessionPreviewItem:
      summary: 会话预览项
      type: object
      properties:
        key:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SessionMessage'
      required:
        - key
      additionalProperties: true

    SessionArchivesResponse:
      summary: 会话归档物列表响应
      type: object
      properties:
        path:
          type: string
          description: 归档查询路径
        contents:
          type: array
          description: 路径下的归档项
          items:
            $ref: '#/components/schemas/SessionArchiveEntry'
      required:
        - path
        - contents
      additionalProperties: true

    SessionArchiveEntry:
      summary: 归档项
      type: object
      properties:
        name:
          type: string
          description: 文件或目录名称
        type:
          type: string
          description: 归档项类型
          enum:
            - file
            - directory
            - other
      required:
        - name
        - type
      additionalProperties: true
