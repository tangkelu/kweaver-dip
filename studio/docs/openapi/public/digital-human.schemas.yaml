components:
  schemas:
    DigitalHumanList:
      summary: 数字员工列表
      type: array
      items:
        type: object
        properties:
          $ref: '#/components/schemas/DigitalHuman'

    DigitalHuman:
      summary: 数字员工信息
      type: object
      properties:
        id:
          type: string
          title: 数字员工 ID
        name:
          type: string
          title: 数字员工名称
        avatar:
          type: string
          title: 数字员工头像
      required:
        - id
        - name