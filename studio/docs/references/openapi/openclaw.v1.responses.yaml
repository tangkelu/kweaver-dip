openapi: 3.1.0
info:
  title: OpenClaw Gateway OpenResponses API
  version: "1.0.0"
  description: >
    OpenClaw Gateway exposes an OpenResponses-compatible POST /v1/responses endpoint.
    The endpoint accepts item-based input, optional client function tools, and can
    return either a JSON response resource or SSE streaming events.
servers:
  - url: http://{host}:{port}
    variables:
      host:
        default: 127.0.0.1
      port:
        default: "18789"
security:
  - bearerAuth: []
paths:
  /v1/responses:
    post:
      operationId: createResponse
      summary: Create a response
      description: >
        Runs a Gateway agent turn through an OpenResponses-compatible HTTP surface.
        By default, requests are stateless per call unless a stable `user` value or
        explicit `x-openclaw-session-key` header is provided.
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer token or password-based bearer secret.
        - in: header
          name: x-openclaw-agent-id
          required: false
          schema:
            type: string
          description: >
            Optional agent override. The model field may also target an agent using
            `openclaw:<agentId>` or `agent:<agentId>`.
        - in: header
          name: x-openclaw-session-key
          required: false
          schema:
            type: string
          description: Optional explicit session routing key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResponseBody"
      responses:
        "200":
          description: >
            Successful response. Returns JSON when `stream` is omitted/false, or
            `text/event-stream` when `stream=true`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseResource"
            text/event-stream:
              schema:
                type: string
                description: >
                  Server-sent events. Each `data:` line contains one JSON object matching
                  one of the event schemas in `components.schemas.StreamingEvent`.
              examples:
                stream:
                  value: |
                    event: response.created
                    data: {"type":"response.created","response":{"id":"resp_123","object":"response","created_at":1710000000,"status":"in_progress","model":"openclaw:main","output":[],"usage":{"input_tokens":0,"output_tokens":0,"total_tokens":0}}}

                    event: response.in_progress
                    data: {"type":"response.in_progress","response":{"id":"resp_123","object":"response","created_at":1710000000,"status":"in_progress","model":"openclaw:main","output":[],"usage":{"input_tokens":0,"output_tokens":0,"total_tokens":0}}}
        "400":
          description: Invalid request body or invalid tool/input configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Missing or invalid bearer authentication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Authentication rate limit exceeded.
          headers:
            Retry-After:
              schema:
                type: string
              description: Seconds until the client should retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseResource"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    InputTextContentPart:
      type: object
      required: [type, text]
      additionalProperties: false
      properties:
        type:
          type: string
          const: input_text
        text:
          type: string
    OutputTextContentPart:
      type: object
      required: [type, text]
      additionalProperties: false
      properties:
        type:
          type: string
          const: output_text
        text:
          type: string
    InputImageSource:
      oneOf:
        - type: object
          required: [type, url]
          additionalProperties: false
          properties:
            type:
              type: string
              const: url
            url:
              type: string
              format: uri
        - type: object
          required: [type, media_type, data]
          additionalProperties: false
          properties:
            type:
              type: string
              const: base64
            media_type:
              type: string
              enum: [image/jpeg, image/png, image/gif, image/webp, image/heic, image/heif]
            data:
              type: string
    InputImageContentPart:
      type: object
      required: [type, source]
      additionalProperties: false
      properties:
        type:
          type: string
          const: input_image
        source:
          $ref: "#/components/schemas/InputImageSource"
    InputFileSource:
      oneOf:
        - type: object
          required: [type, url]
          additionalProperties: false
          properties:
            type:
              type: string
              const: url
            url:
              type: string
              format: uri
        - type: object
          required: [type, media_type, data]
          additionalProperties: false
          properties:
            type:
              type: string
              const: base64
            media_type:
              type: string
            data:
              type: string
            filename:
              type: string
    InputFileContentPart:
      type: object
      required: [type, source]
      additionalProperties: false
      properties:
        type:
          type: string
          const: input_file
        source:
          $ref: "#/components/schemas/InputFileSource"
    ContentPart:
      oneOf:
        - $ref: "#/components/schemas/InputTextContentPart"
        - $ref: "#/components/schemas/OutputTextContentPart"
        - $ref: "#/components/schemas/InputImageContentPart"
        - $ref: "#/components/schemas/InputFileContentPart"
    MessageItem:
      type: object
      required: [type, role, content]
      additionalProperties: false
      properties:
        type:
          type: string
          const: message
        role:
          type: string
          enum: [system, developer, user, assistant]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ContentPart"
    FunctionCallItem:
      type: object
      required: [type, name, arguments]
      additionalProperties: false
      properties:
        type:
          type: string
          const: function_call
        id:
          type: string
        call_id:
          type: string
        name:
          type: string
        arguments:
          type: string
    FunctionCallOutputItem:
      type: object
      required: [type, call_id, output]
      additionalProperties: false
      properties:
        type:
          type: string
          const: function_call_output
        call_id:
          type: string
        output:
          type: string
    ReasoningItem:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          const: reasoning
        content:
          type: string
        encrypted_content:
          type: string
        summary:
          type: string
    ItemReferenceItem:
      type: object
      required: [type, id]
      additionalProperties: false
      properties:
        type:
          type: string
          const: item_reference
        id:
          type: string
    ItemParam:
      oneOf:
        - $ref: "#/components/schemas/MessageItem"
        - $ref: "#/components/schemas/FunctionCallItem"
        - $ref: "#/components/schemas/FunctionCallOutputItem"
        - $ref: "#/components/schemas/ReasoningItem"
        - $ref: "#/components/schemas/ItemReferenceItem"
    FunctionToolDefinition:
      type: object
      required: [type, function]
      additionalProperties: false
      properties:
        type:
          type: string
          const: function
        function:
          type: object
          required: [name]
          properties:
            name:
              type: string
              minLength: 1
            description:
              type: string
            parameters:
              type: object
              additionalProperties: true
    ToolChoice:
      oneOf:
        - type: string
          enum: [auto, none, required]
        - type: object
          required: [type, function]
          properties:
            type:
              type: string
              const: function
            function:
              type: object
              required: [name]
              properties:
                name:
                  type: string
    CreateResponseBody:
      type: object
      additionalProperties: false
      required: [model, input]
      properties:
        model:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/ItemParam"
        instructions:
          type: string
        tools:
          type: array
          items:
            $ref: "#/components/schemas/FunctionToolDefinition"
        tool_choice:
          $ref: "#/components/schemas/ToolChoice"
        stream:
          type: boolean
        max_output_tokens:
          type: integer
          minimum: 1
        max_tool_calls:
          type: integer
          minimum: 1
        user:
          type: string
        temperature:
          type: number
        top_p:
          type: number
        metadata:
          type: object
          additionalProperties:
            type: string
        store:
          type: boolean
        previous_response_id:
          type: string
        reasoning:
          type: object
          properties:
            effort:
              type: string
              enum: [low, medium, high]
            summary:
              type: string
              enum: [auto, concise, detailed]
        truncation:
          type: string
          enum: [auto, disabled]
    OutputMessageItem:
      type: object
      required: [type, id, role, content]
      additionalProperties: false
      properties:
        type:
          type: string
          const: message
        id:
          type: string
        role:
          type: string
          const: assistant
        content:
          type: array
          items:
            $ref: "#/components/schemas/OutputTextContentPart"
        status:
          type: string
          enum: [in_progress, completed]
    OutputFunctionCallItem:
      type: object
      required: [type, id, call_id, name, arguments]
      additionalProperties: false
      properties:
        type:
          type: string
          const: function_call
        id:
          type: string
        call_id:
          type: string
        name:
          type: string
        arguments:
          type: string
        status:
          type: string
          enum: [in_progress, completed]
    OutputReasoningItem:
      type: object
      required: [type, id]
      additionalProperties: false
      properties:
        type:
          type: string
          const: reasoning
        id:
          type: string
        content:
          type: string
        summary:
          type: string
    OutputItem:
      oneOf:
        - $ref: "#/components/schemas/OutputMessageItem"
        - $ref: "#/components/schemas/OutputFunctionCallItem"
        - $ref: "#/components/schemas/OutputReasoningItem"
    Usage:
      type: object
      required: [input_tokens, output_tokens, total_tokens]
      properties:
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    ResponseError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    ResponseResource:
      type: object
      required: [id, object, created_at, status, model, output, usage]
      properties:
        id:
          type: string
        object:
          type: string
          const: response
        created_at:
          type: integer
        status:
          type: string
          enum: [in_progress, completed, failed, cancelled, incomplete]
        model:
          type: string
        output:
          type: array
          items:
            $ref: "#/components/schemas/OutputItem"
        usage:
          $ref: "#/components/schemas/Usage"
        error:
          $ref: "#/components/schemas/ResponseError"
    ResponseCreatedEvent:
      type: object
      required: [type, response]
      properties:
        type:
          type: string
          const: response.created
        response:
          $ref: "#/components/schemas/ResponseResource"
    ResponseInProgressEvent:
      type: object
      required: [type, response]
      properties:
        type:
          type: string
          const: response.in_progress
        response:
          $ref: "#/components/schemas/ResponseResource"
    ResponseCompletedEvent:
      type: object
      required: [type, response]
      properties:
        type:
          type: string
          const: response.completed
        response:
          $ref: "#/components/schemas/ResponseResource"
    ResponseFailedEvent:
      type: object
      required: [type, response]
      properties:
        type:
          type: string
          const: response.failed
        response:
          $ref: "#/components/schemas/ResponseResource"
    ResponseOutputItemAddedEvent:
      type: object
      required: [type, output_index, item]
      properties:
        type:
          type: string
          const: response.output_item.added
        output_index:
          type: integer
          minimum: 0
        item:
          $ref: "#/components/schemas/OutputItem"
    ResponseOutputItemDoneEvent:
      type: object
      required: [type, output_index, item]
      properties:
        type:
          type: string
          const: response.output_item.done
        output_index:
          type: integer
          minimum: 0
        item:
          $ref: "#/components/schemas/OutputItem"
    ResponseContentPartAddedEvent:
      type: object
      required: [type, item_id, output_index, content_index, part]
      properties:
        type:
          type: string
          const: response.content_part.added
        item_id:
          type: string
        output_index:
          type: integer
          minimum: 0
        content_index:
          type: integer
          minimum: 0
        part:
          $ref: "#/components/schemas/OutputTextContentPart"
    ResponseContentPartDoneEvent:
      type: object
      required: [type, item_id, output_index, content_index, part]
      properties:
        type:
          type: string
          const: response.content_part.done
        item_id:
          type: string
        output_index:
          type: integer
          minimum: 0
        content_index:
          type: integer
          minimum: 0
        part:
          $ref: "#/components/schemas/OutputTextContentPart"
    ResponseOutputTextDeltaEvent:
      type: object
      required: [type, item_id, output_index, content_index, delta]
      properties:
        type:
          type: string
          const: response.output_text.delta
        item_id:
          type: string
        output_index:
          type: integer
          minimum: 0
        content_index:
          type: integer
          minimum: 0
        delta:
          type: string
    ResponseOutputTextDoneEvent:
      type: object
      required: [type, item_id, output_index, content_index, text]
      properties:
        type:
          type: string
          const: response.output_text.done
        item_id:
          type: string
        output_index:
          type: integer
          minimum: 0
        content_index:
          type: integer
          minimum: 0
        text:
          type: string
    StreamingEvent:
      oneOf:
        - $ref: "#/components/schemas/ResponseCreatedEvent"
        - $ref: "#/components/schemas/ResponseInProgressEvent"
        - $ref: "#/components/schemas/ResponseCompletedEvent"
        - $ref: "#/components/schemas/ResponseFailedEvent"
        - $ref: "#/components/schemas/ResponseOutputItemAddedEvent"
        - $ref: "#/components/schemas/ResponseOutputItemDoneEvent"
        - $ref: "#/components/schemas/ResponseContentPartAddedEvent"
        - $ref: "#/components/schemas/ResponseContentPartDoneEvent"
        - $ref: "#/components/schemas/ResponseOutputTextDeltaEvent"
        - $ref: "#/components/schemas/ResponseOutputTextDoneEvent"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            type:
              type: string
