namespace: kweaver

labels:
  deployment:
    name: dip-studio
  pod:
    app: dip-studio
  service:
    app: dip-studio

name: dip-studio-deployment
replicaCount: 1

image:
  registry: swr.cn-east-3.myhuaweicloud.com/kweaver-ai
  repository: dip/dip-studio
  tag: "0.4.0-poc"
  pullPolicy: IfNotPresent

service:
  name: dip-studio
  type: ClusterIP
  port: 3000
  targetPort: 3000

class-443:
  ingressClass: 'class-443'

ingress:
  enabled: true
  path: /api/dip-studio
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"

studio:
  nodeEnv: production
  envFilePath: /data/.env
  OpenClawRootDir: /data/.openclaw
  KWeaverBaseURL: http://bkn-backend-svc:13014
  KWeaverHydraAdminURL: http://hydra-admin:4445

resources:
  studio:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

nodeSelector: {}
affinity: {}
tolerations: []
